<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.ID}}</title>
<style>
  :root {
    --fg: #1f2328; --muted: #59636e; --border: #d1d9e0; --link: #0969da;
    --code-bg: #f6f8fa; --accent: #d1d9e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; color: var(--fg); background: #fff; }
  .fs-header {
    padding: 8px 12px;
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .fs-header .fs-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fs-header a { color: var(--link); text-decoration: none; margin-left: 12px; }
  .fs-header a:hover { text-decoration: underline; }
  .fs-md {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    line-height: 1.6;
    word-wrap: break-word;
  }
  .fs-md h1, .fs-md h2 { padding-bottom: .3em; border-bottom: 1px solid var(--accent); }
  .fs-md h1, .fs-md h2, .fs-md h3, .fs-md h4 { margin-top: 1.5em; margin-bottom: .6em; font-weight: 600; line-height: 1.25; }
  .fs-md h1:first-child, .fs-md h2:first-child { margin-top: 0; }
  .fs-md a { color: var(--link); text-decoration: none; }
  .fs-md a:hover { text-decoration: underline; }
  .fs-md img { max-width: 100%; }
  .fs-md code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 85%;
    background: var(--code-bg);
    padding: .2em .4em;
    border-radius: 6px;
  }
  .fs-md pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 6px;
    overflow: auto;
  }
  .fs-md pre code { background: none; padding: 0; font-size: 100%; }
  .fs-md blockquote {
    margin: 0;
    padding: 0 1em;
    color: var(--muted);
    border-left: .25em solid var(--accent);
  }
  .fs-md table { border-collapse: collapse; display: block; width: max-content; max-width: 100%; overflow: auto; }
  .fs-md th, .fs-md td { padding: 6px 13px; border: 1px solid var(--border); }
  .fs-md tr:nth-child(2n) { background: var(--code-bg); }
  .fs-md hr { height: 1px; border: 0; background: var(--accent); margin: 24px 0; }
</style>
</head>
<body>
<div class="fs-header">
  <span class="fs-name">{{.ID}}</span>
  <span>
    <a href="/{{.ID}}?raw=1" target="_blank" rel="noopener">raw</a>
    <a href="/{{.ID}}?dl=1">download</a>
  </span>
</div>
<article class="fs-md">{{.Body}}</article>
</body>
</html>
