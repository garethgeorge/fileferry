<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decrypting…</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem; text-align: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8fafc; color: #64748b;
    }
    .err { color: #dc2626; font-weight: 600; max-width: 32rem; }
  </style>
</head>
<body>
  <p id="msg">Decrypting…</p>
  <script>
    "use strict";
    // The key lives in the URL fragment (after #), which the browser never
    // sends to the server. Copy it into a path-scoped, short-lived cookie and
    // reload without the fragment: the browser then sends the key in the Cookie
    // header on this navigation and every preview subresource, so the server
    // decrypts and renders the same preview any other file gets.
    (function () {
      var key = location.hash.charAt(0) === "#" ? location.hash.slice(1) : location.hash;
      if (!key) {
        var msg = document.getElementById("msg");
        msg.className = "err";
        msg.textContent = "This encrypted link is missing its key (the part after #), " +
          "or cookies are disabled in this browser.";
        return;
      }
      // The fragment is already percent-encoded, so it is a valid cookie value;
      // the server percent-decodes it back to the key.
      var cookie = "ffkey=" + key + "; path=" + location.pathname +
        "; max-age=120; samesite=strict";
      if (location.protocol === "https:") cookie += "; secure";
      document.cookie = cookie;
      // Reload without the fragment. If cookies are blocked we land back here
      // with an empty fragment and show the message above (no redirect loop).
      location.replace(location.pathname + location.search);
    })();
  </script>
</body>
</html>
