<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decrypting…</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 1.5rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
      color: #0f172a;
    }
    .card {
      width: 100%; max-width: 24rem; padding: 2.5rem 2rem;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 1rem;
      box-shadow: 0 10px 30px -12px rgba(15, 23, 42, .18);
      text-align: center;
    }
    .badge {
      position: relative; width: 68px; height: 68px; margin: 0 auto 1.25rem;
      display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid #e2e8f0; border-top-color: #4f46e5;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; border-top-color: #e2e8f0; }
    }
    .glyph { width: 30px; height: 30px; color: #4f46e5; }
    .glyph.error, .glyph.done { display: none; }
    h1 { margin: 0 0 .4rem; font-size: 1.15rem; font-weight: 600; letter-spacing: -.01em; }
    p  { margin: 0; font-size: .875rem; line-height: 1.5; color: #64748b; }

    /* Error state */
    body.is-error .spinner,
    body.is-error .glyph.lock { display: none; }
    body.is-error .badge { background: #fef2f2; border-radius: 50%; }
    body.is-error .glyph.error { display: block; color: #dc2626; }
    body.is-error h1 { color: #dc2626; }

    /* Done state (shown when the reload turned out to be a download) */
    body.is-done .spinner,
    body.is-done .glyph.lock { display: none; }
    body.is-done .badge { background: #f0fdf4; border-radius: 50%; }
    body.is-done .glyph.done { display: block; color: #16a34a; }

    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(to bottom, #0b1120, #0f172a); color: #e2e8f0; }
      .card { background: #1e293b; border-color: #334155; box-shadow: 0 10px 30px -12px rgba(0,0,0,.5); }
      p { color: #94a3b8; }
      .spinner { border-color: #334155; border-top-color: #818cf8; }
      .glyph { color: #818cf8; }
      body.is-error .badge { background: rgba(220,38,38,.12); }
      body.is-error .glyph.error, body.is-error h1 { color: #f87171; }
      body.is-done .badge { background: rgba(22,163,74,.14); }
      body.is-done .glyph.done { color: #4ade80; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <div class="spinner"></div>
      <svg class="glyph lock" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
      <svg class="glyph error" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
      <svg class="glyph done" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
    </div>
    <h1 id="title">Decrypting…</h1>
    <p id="detail">Unlocking your file in this browser. Just a moment.</p>
  </div>

  <script>
    "use strict";
    // The key lives in the URL fragment (after #), which the browser never
    // sends to the server. Copy it into a path-scoped, short-lived cookie and
    // reload: the browser then sends the key in the Cookie header on this
    // navigation and every preview subresource, so the server decrypts and
    // renders the same preview any other file gets.
    //
    // We reload rather than redirect to a fragment-stripped URL, so the #key
    // stays in the address bar. That keeps an encrypted link behaving like an
    // ordinary one: it remains complete and reloadable — if the short-lived
    // cookie later expires, a plain refresh re-bootstraps from the fragment
    // instead of breaking.
    (function () {
      var title = document.getElementById("title");
      var detail = document.getElementById("detail");

      function fail(text) {
        document.body.className = "is-error";
        title.textContent = "Couldn’t decrypt";
        detail.textContent = text;
      }

      var key = location.hash.charAt(0) === "#" ? location.hash.slice(1) : location.hash;
      if (!key) {
        fail("This encrypted link is missing its key (the part after #).");
        return;
      }
      // The fragment is already percent-encoded, so it is a valid cookie value;
      // the server percent-decodes it back to the key.
      var cookie = "ffkey=" + key + "; path=" + location.pathname +
        "; max-age=120; samesite=strict";
      if (location.protocol === "https:") cookie += "; secure";
      document.cookie = cookie;
      // If cookies are blocked the write is silently dropped; detect that by
      // reading it back, so we show a message instead of reloading forever.
      if (document.cookie.indexOf("ffkey=") === -1) {
        fail("This browser is blocking cookies, which are needed to decrypt the file here.");
        return;
      }

      // Reloading serves the decrypted file. If it renders inline (a preview or
      // an image), the response replaces this document and the timer below dies
      // with it. If instead the server sends it as a download, the browser hands
      // the bytes to the download manager and leaves us sitting on this page —
      // so after a short grace period we assume that happened, show a "done"
      // state, and try to close the tab (a no-op for tabs the user opened
      // themselves, which is why we still paint the message).
      setTimeout(function () {
        document.body.className = "is-done";
        title.textContent = "Download started";
        detail.textContent = "Your file is downloading. You can close this tab.";
        window.close();
      }, 600);

      // Reload the same URL (fragment intact in the address bar); the server now
      // sees the cookie and serves the decrypted file.
      location.reload();
    })();
  </script>
</body>
</html>
