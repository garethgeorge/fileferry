<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fileferry</title>
  <link rel="stylesheet" href="/upload/static/tailwind.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <main class="mx-auto max-w-3xl px-4 py-10">

    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold tracking-tight text-slate-900">fileferry</h1>
      <p class="mt-1 text-sm text-slate-500">Self-hosted file sharing. Drop, paste, or browse to upload.</p>
    </header>

    <!-- Options row -->
    <div class="mb-4 flex flex-wrap items-end gap-3">
      <div class="flex-1 min-w-[12rem]">
        <label for="description" class="mb-1 block text-xs font-medium text-slate-500">Description (optional)</label>
        <input id="description" type="text" placeholder="my description"
          class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none" />
      </div>
      <div>
        <label for="paste-ext" class="mb-1 block text-xs font-medium text-slate-500">Paste ext</label>
        <input id="paste-ext" type="text" value="txt" style="width: 5ch"
          class="rounded-md border border-slate-300 bg-white px-2 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none" />
      </div>
      <div>
        <label for="expires" class="mb-1 block text-xs font-medium text-slate-500">Expires</label>
        <select id="expires"
          class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none">
          <option value="1">1 day</option>
          <option value="7">1 week</option>
          <option value="30">1 month</option>
          <option value="365" selected>1 year</option>
          <option value="0">never</option>
        </select>
      </div>
    </div>

    <!-- Dropzone -->
    <div id="dropzone"
      class="flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-300 bg-white px-6 py-16 text-center transition-colors hover:border-indigo-400">
      <svg class="mb-3 h-10 w-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
      </svg>
      <p class="text-sm font-medium text-slate-600">Drop files here, click to browse, or paste text/images anywhere</p>
      <input id="file-input" type="file" multiple class="hidden" />
    </div>

    <!-- Uploads -->
    <section id="uploads-section" class="mt-8 hidden">
      <h2 class="mb-3 text-lg font-semibold text-slate-900">Uploads</h2>
      <div id="uploads-list" class="space-y-3"></div>
    </section>

    <!-- Files -->
    <section class="mt-10">
      <h2 class="mb-3 text-lg font-semibold text-slate-900">Files</h2>
      <div id="files-list" class="divide-y divide-slate-200 overflow-hidden rounded-xl border border-slate-200 bg-white"></div>
      <p id="files-empty" class="hidden py-8 text-center text-sm text-slate-400">No files yet.</p>
      <div id="sentinel" class="h-8"></div>
    </section>

  </main>
  <script src="/upload/static/app.js"></script>
</body>
</html>
