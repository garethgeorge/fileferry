<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fileferry</title>
  <link rel="stylesheet" href="/upload/static/tailwind.css" />
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 text-slate-800 antialiased">
  <main class="mx-auto max-w-3xl px-4 py-16">

    <!-- Header -->
    <header class="mb-10 text-center">
      <h1 class="text-4xl font-bold tracking-tight text-slate-900">fileferry</h1>
      <p class="mt-2 text-sm text-slate-500">Self-hosted file sharing — drop, paste, or type to share in seconds.</p>
    </header>

    <!-- Compose / dropzone -->
    <div id="dropzone"
      class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm ring-1 ring-transparent transition-all focus-within:border-indigo-300 focus-within:shadow-lg focus-within:ring-indigo-100">

      <!-- Centered hint (collapses while composing; see app.js syncCompose) -->
      <div id="drop-hint" class="flex flex-col items-center gap-3 overflow-hidden px-6 pt-10 pb-2 text-center transition-all duration-300 ease-out">
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-indigo-50 text-indigo-500">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 7.5 7.5 12M12 7.5V21" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-slate-700">Drop or paste files here to upload</p>
          <p class="mt-0.5 text-xs text-slate-400">…or just start typing below</p>
        </div>
      </div>

      <!-- Text entry -->
      <textarea id="text-input" rows="4"
        placeholder="Type or paste a text snippet to share…"
        class="block w-full resize-y border-0 bg-transparent px-6 py-4 text-center text-sm text-slate-700 placeholder:text-slate-300 transition-all duration-300 ease-out focus:outline-none focus:ring-0"></textarea>

      <!-- Footer -->
      <div class="flex items-center justify-between gap-3 border-t border-slate-100 bg-slate-50/60 px-4 py-2.5">
        <button id="browse-btn" type="button"
          class="rounded-md px-2 py-1 text-xs font-medium text-slate-500 transition-colors hover:bg-white hover:text-indigo-600">Browse files…</button>
        <button id="upload-text-btn" type="button" disabled
          class="rounded-md bg-indigo-600 px-3.5 py-1.5 text-xs font-medium text-white shadow-sm transition-all hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-40 disabled:shadow-none">
          Upload text <span class="ml-1 opacity-70">⌘↵</span></button>
      </div>
      <input id="file-input" type="file" multiple class="hidden" />
    </div>

    <!-- Options row -->
    <div class="mt-4 flex flex-wrap items-start gap-3">
      <div class="flex-1 min-w-[12rem]">
        <label for="description" class="mb-1 block text-xs font-medium text-slate-500">URL suffix (optional)</label>
        <input id="description" type="text" placeholder="my-notes" maxlength="40"
          class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none" />
        <p class="mt-1 text-xs text-slate-400">Appended to the file URL, e.g. <span class="font-mono">/9ef-p9m2rr-my-notes.txt</span>. Add an extension (<span class="font-mono">my-notes.md</span>) to relabel text content.</p>
      </div>
      <div>
        <label for="paste-ext" class="mb-1 block text-xs font-medium text-slate-500">Paste ext</label>
        <input id="paste-ext" type="text" value="txt" style="width: 5ch"
          class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-sm shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none" />
      </div>
      <div>
        <label for="expires" class="mb-1 block text-xs font-medium text-slate-500">Expires</label>
        <select id="expires"
          class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
          <option value="1">1 day</option>
          <option value="7">1 week</option>
          <option value="30">1 month</option>
          <option value="365" selected>1 year</option>
          <option value="0">never</option>
        </select>
      </div>
    </div>

    <!-- Uploads -->
    <section id="uploads-section" class="mt-8 hidden">
      <h2 class="mb-3 text-lg font-semibold text-slate-900">Uploads</h2>
      <div id="uploads-list" class="space-y-3"></div>
    </section>

    <!-- Files -->
    <section class="mt-10">
      <h2 class="mb-3 text-lg font-semibold text-slate-900">Files</h2>
      <div id="files-list" class="divide-y divide-slate-100 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"></div>
      <p id="files-empty" class="hidden py-8 text-center text-sm text-slate-400">No files yet.</p>
      <div id="sentinel" class="h-8"></div>
    </section>

  </main>
  <script src="/upload/static/app.js"></script>
</body>
</html>
