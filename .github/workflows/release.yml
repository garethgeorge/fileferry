name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

  # Always runs after release-please (in the same workflow because tags/releases
  # created with the default GITHUB_TOKEN do not trigger other workflows). When
  # this push cut a release it does a full goreleaser release; otherwise it does
  # a snapshot build and uploads the archives as a downloadable workflow
  # artifact.
  goreleaser:
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      RELEASED: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # The release tag when one was cut, else the pushed commit (empty ref).
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Docker is only built/pushed on a real release. QEMU enables the emulated
      # arm64 image build.
      - name: Set up QEMU
        if: env.RELEASED == 'true'
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        if: env.RELEASED == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        if: env.RELEASED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Release
        if: env.RELEASED == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Snapshot: builds the archives without tagging, publishing, or pushing.
      # Docker is skipped — images aren't downloadable workflow artifacts, and
      # the emulated arm64 build is slow. Produces downloadable test builds on
      # non-release pushes.
      - name: Snapshot build
        if: env.RELEASED != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --snapshot --skip=docker
      - name: Upload snapshot artifacts
        if: env.RELEASED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error
